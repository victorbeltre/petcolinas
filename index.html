function useSeguimientosConSeed(seed) {
  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem("pc_seguimientos");
      const stored = s ? JSON.parse(s) : [];
      const seedIds = new Set(seed.map((c) => c.id));
      const manuales = stored.filter((c) => !seedIds.has(c.id));
      return [...seed, ...manuales];
    } catch {
      return seed;
    }
  });
  useEffect(() => {
    try {
      localStorage.setItem("pc_seguimientos", JSON.stringify(val));
    } catch {
    }
  }, [val]);
  return [val, setVal];
}
